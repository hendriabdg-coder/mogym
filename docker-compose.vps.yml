name: mogym

services:
  postgres:
    image: postgres:16-alpine
    container_name: mogym_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mogym_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: mogym_backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@mogym_postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://mogym_redis:6379
      UPLOAD_PATH: ./uploads
      PORT: 3030
    volumes:
      - uploads_data:/app/apps/backend/uploads
    networks:
      - internal
      - web
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3030/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
        NEXT_PUBLIC_APP_NAME: CutTrack
        NEXT_PUBLIC_APP_URL: https://mogym.endrichtech.com
    container_name: mogym_frontend
    restart: unless-stopped
    environment:
      PORT: 3031
    networks:
      - web
    depends_on:
      backend:
        condition: service_healthy

networks:
  internal:
  web:
    external: true
    name: coffeeshophub_internal

volumes:
  postgres_data:
  redis_data:
  uploads_data:
